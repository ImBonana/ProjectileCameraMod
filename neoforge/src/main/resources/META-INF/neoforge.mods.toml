modLoader = "javafml"
loaderVersion = "[2,)"
#issueTrackerURL = ""
license = "MIT"

[[mods]]
modId = "${mod_id}"
version = "${version}"
displayName = "ProjetileCamera"
authors = "ImBanana"
description = '''
Add camera to projectiles
'''
logoFile = "assets/${mod_id}/icon.png"
modUrl = "https://modrinth.com/project/${modrinth_id}"

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "${loader_version_range}"
ordering = "NONE"
side = "CLIENT"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "${mc_version_range}"
ordering = "NONE"
side = "CLIENT"

[[dependencies.${mod_id}]]
modId = "yet_another_config_lib_v3"
mandatory = true
versionRange = "[${yacl_version},)"
ordering = "NONE"
side = "CLIENT"

[[mixins]]
config = "${mod_id}.mixins.json"
